<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Wound Healing Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f5f6fa;
    }
    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #34495e, #2c3e50);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
    }
    .sidebar a {
      text-decoration: none;
      color: white;
      width: 80%;
      text-align: center;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      transition: 0.3s;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: rgba(255, 255, 255, 0.1);
    }
    .sidebar a:hover {
      background-color: #1abc9c;
      transform: scale(1.05);
    }
    .main-content {
      flex: 1;
      padding: 40px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Healing Dashboard</h2>
    <a href="/run">🏠 Home</a>
    <a href="/upload">📤 Upload Image</a>
    <a href="/analyze">🧠 Analyze Wound</a>
    <a href="/history">📊 View Healing History</a>
  </div>

  <div class="main-content">
    {% block content %}
    {% endblock %}
  </div>

</body>
</html>
